{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ TR "TodoApp" }}</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/custom.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>
    {{template "navbar"}}
    <div class="container">
        {{template "content" . }}
    </div>

    <footer class="text-center py-4 mt-5 text-muted">
        <div class="mb-2">
            <a href="/set-lang?l=en" class="text-decoration-none mx-2 {{if eq CurrentLang "en"}}fw-bold text-dark{{end}}">English</a>
            |
            <a href="/set-lang?l=ja" class="text-decoration-none mx-2 {{if eq CurrentLang "ja"}}fw-bold text-dark{{end}}">日本語</a>
        </div>
        <small>&copy; 2024 {{ TR "TodoApp" }}. {{ TR "BuiltWithGo" }}</small>
    </footer>
    </body><script src="/static/js/jquery-3.6.0.min.js"></script>
<script src="/static/js/bootstrap.bundle.min.js"></script>
</html>
{{end}}
