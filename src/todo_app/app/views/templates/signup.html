{{define "content" }}
<div class="form-signin">
    <div class="text-center mb-4">
        <i class="fa-solid fa-user-plus fs-1 text-primary mb-3"></i>
        <h1 class="h3 mb-3 fw-bold">{{ TR "CreateAccount" }}</h1>
        <p class="text-muted">{{ TR "JoinUs" }}</p>
    </div>

    <form action="/signup" method="post">
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold">{{ TR "FullName" }}</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-user text-muted"></i></span>
                <input type="text" name="name" class="form-control border-start-0 ps-0" placeholder="John Doe" required autofocus>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label text-muted small fw-bold">{{ TR "EmailAddress" }}</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="name@example.com" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted small fw-bold">{{ TR "Password" }}</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="{{ TR "Min8Chars" }}" required>
            </div>
        </div>

        <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">{{ TR "CreateAccount" }}</button>
        
        <div class="text-center">
            <span class="text-muted small">{{ TR "AlreadyHaveAccount" }}</span>
            <a href="/login" class="small fw-bold text-decoration-none ms-1">{{ TR "Login" }}</a>
        </div>
    </form>
</div>
{{end}}
