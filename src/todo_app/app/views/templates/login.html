{{ define "content" }}
<div class="form-signin">
    <div class="text-center mb-4">
        <i class="fa-solid fa-check-double fs-1 text-primary mb-3"></i>
        <h1 class="h3 mb-3 fw-bold">{{ TR "WelcomeBack" }}</h1>
        <p class="text-muted">{{ TR "LoginToManage" }}</p>
    </div>

    <form action="/authenticate" method="post">
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold">{{ TR "EmailOrUsername" }}</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                <input type="text" name="identifier" class="form-control border-start-0 ps-0" placeholder="name@example.com / username" required autofocus>      
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted small fw-bold">{{ TR "Password" }}</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="{{ TR "Password" }}" required>       
            </div>
        </div>

        <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">{{ TR "Login" }}</button>

        <div class="text-center">
            <span class="text-muted small">{{ TR "DontHaveAccount" }}</span>
            <a href="/signup" class="small fw-bold text-decoration-none ms-1">{{ TR "SignUp" }}</a>
        </div>
    </form>
</div>
{{end}}
