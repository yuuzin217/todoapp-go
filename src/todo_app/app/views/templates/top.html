{{define "content"}}
<div class="hero-section text-center mt-5">
    <h1 class="display-3 mb-4">{{ TR "ManageTasksWithEase" }}</h1>
    <p class="lead mb-5 opacity-75">{{ TR "SimpleFastSecure" }}</p>
    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
        <a href="/signup" class="btn btn-light btn-lg px-5 py-3 text-primary">{{ TR "GetStartedForFree" }}</a>
        <a href="/login" class="btn btn-outline-light btn-lg px-5 py-3">{{ TR "Login" }}</a>
    </div>
</div>

<div class="row text-center mt-5 pt-5">
    <div class="col-md-4">
        <div class="p-3">
            <i class="fa-solid fa-bolt fs-1 text-primary mb-3"></i>
            <h3>{{ TR "FastAndSimple" }}</h3>
            <p class="text-muted">{{ TR "FastAndSimpleDesc" }}</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="p-3">
            <i class="fa-solid fa-shield-halved fs-1 text-primary mb-3"></i>
            <h3>{{ TR "Secure" }}</h3>
            <p class="text-muted">{{ TR "SecureDesc" }}</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="p-3">
            <i class="fa-solid fa-mobile-screen-button fs-1 text-primary mb-3"></i>
            <h3>{{ TR "Responsive" }}</h3>
            <p class="text-muted">{{ TR "ResponsiveDesc" }}</p>
        </div>
    </div>
</div>
{{end}}
