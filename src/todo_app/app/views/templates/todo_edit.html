{{define "content"}}
<div class="row justify-content-center">
    <div class="col-md-6 mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="mb-4">
                    <h2 class="fw-bold text-primary mb-1">{{ TR "EditTask" }}</h2>
                    <p class="text-muted">{{ TR "UpdateTaskDetails" }}</p>
                </div>

                <form action="/todos/update/{{.ID}}" method="post">
                    <div class="mb-4">
                        <textarea class="form-control" name="content" id="content" placeholder="Update your task..." rows="5" required autofocus>{{.Content}}</textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="/todos" class="btn btn-light border px-4">{{ TR "Cancel" }}</a>
                        <button class="btn btn-primary px-5" type="submit">
                            <i class="fa-solid fa-check me-2"></i>{{ TR "UpdateTask" }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}
